apiVersion: v1
kind: Pod
metadata:
  name: attacker
  namespace: apps
spec:
  containers:
    - name: attacker
      image: google/cloud-sdk:latest
      command: ["/bin/bash", "-c", "tail -f /dev/null"]
      volumeMounts:
        - mountPath: /rootfs
          name: rootfs
  volumes:
    - name: rootfs
      hostPath:
        path: /
